<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Contraseña | NOVA PRIME</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
width:380px;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,.3);
}

h2{
text-align:center;
color:#1e3a8a;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#64748b;
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
transition:.3s;
}

input:focus{
border-color:#2563eb;
outline:none;
box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

.btn{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.hidden{
display:none;
}

.back-link{
text-align:center;
margin-top:15px;
}

.back-link a{
text-decoration:none;
color:#64748b;
font-size:13px;
}

.back-link a:hover{
color:#1e3a8a;
}
</style>

</head>

<body>

<div class="container">

<h2>Recuperar contraseña</h2>
<p class="subtitle">
Ingresa tu correo para restablecer tu contraseña
</p>

<!-- STEP 1 -->
<div id="step1">

<div class="form-group">
<input type="email" id="resetEmail" placeholder="Correo electrónico">
</div>

<button class="btn" onclick="verifyEmail()">
Continuar
</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<div class="form-group">
<input type="password" id="newPassword" placeholder="Nueva contraseña (mínimo 6 caracteres)">
</div>

<button class="btn" onclick="updatePassword()">
Guardar nueva contraseña
</button>

</div>

<div class="back-link">
<a href="login.html">← Volver al login</a>
</div>

</div>

<script>

let currentUser=null;
let currentKey=null;

function verifyEmail(){

const email=document.getElementById("resetEmail").value.trim();

if(!email){
alert("Ingresa tu correo.");
return;
}

/* ===== TUTOR ===== */
let tutor=JSON.parse(localStorage.getItem("novaTutorData"));
if(tutor && tutor.email===email){

currentUser=tutor;
currentKey="novaTutorData";
goToStep2();
return;

}

/* ===== TEACHER ===== */
let teacher=JSON.parse(localStorage.getItem("novaTeacherData"));
if(teacher && teacher.email===email){

currentUser=teacher;
currentKey="novaTeacherData";
goToStep2();
return;

}

/* ===== STUDENT / ADULT ===== */
let student=JSON.parse(localStorage.getItem("novaUser"));
if(student && student.email===email && student.password){

currentUser=student;
currentKey="novaUser";
goToStep2();
return;

}

alert("No existe una cuenta con ese correo.");

}

function goToStep2(){

document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");

}

function updatePassword(){

const newPass=document.getElementById("newPassword").value;

if(newPass.length<6){
alert("La contraseña debe tener mínimo 6 caracteres.");
return;
}

currentUser.password=newPass;
localStorage.setItem(currentKey,JSON.stringify(currentUser));

alert("Contraseña actualizada correctamente.");

window.location.href="login.html";

}

</script>

</body>
</html>
