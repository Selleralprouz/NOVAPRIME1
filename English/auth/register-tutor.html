 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro del Tutor | NOVA PRIME</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">

<div class="auth-container">
    <img src="../assets/images/nova-prime-logo.png" alt="NOVA PRIME Logo" class="logo" style="display:block; margin:0 auto 20px auto; width:140px;">
    
    <h2>Registro del Tutor Legal</h2>
    <p class="subtitle">Crear cuenta como padre, madre o tutor responsable</p>

    <div class="form-group">
        <input type="text" id="tutorName" placeholder="Nombre completo del tutor">
    </div>

    <div class="form-group">
        <input type="email" id="tutorEmail" placeholder="Correo electrónico">
    </div>

    <div class="form-group">
        <input type="password" id="tutorPassword" placeholder="Crear contraseña (mínimo 6 caracteres)">
    </div>

    <div class="checkbox-group">
        <label>
            <input type="checkbox" id="confirmTutor">
            Declaro bajo protesta que soy tutor legal.
        </label>
    </div>

    <div class="checkbox-group">
        <label>
            <input type="checkbox" id="acceptLegal">
            Acepto el <a href="../legal.html" target="_blank">Aviso Legal</a>, la <a href="../privacy.html" target="_blank">Política de Privacidad</a> y los <a href="../terms.html" target="_blank">Términos y Condiciones</a>.
        </label>
    </div>

    <div class="info-box" style="background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 13px; color: #475569; margin-bottom: 20px;">
        🔒 La cuenta del menor quedará vinculada a esta cuenta de tutor.
    </div>

    <button type="button" id="btnRegisterTutor" class="btn-main">
        Crear cuenta
    </button>

    <div class="back-link">
        <a href="age.html">← Volver</a>
    </div>
</div>

<script type="module">
    import { auth, db } from "../firebase.js";
    import { createUserWithEmailAndPassword, updateProfile, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { setDoc, doc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function handleRegister() {
        console.log("Iniciando proceso de registro...");

        const nameVal = document.getElementById("tutorName").value.trim();
        const emailVal = document.getElementById("tutorEmail").value.trim();
        const passVal = document.getElementById("tutorPassword").value;
        const confirmCheck = document.getElementById("confirmTutor").checked;
        const legalCheck = document.getElementById("acceptLegal").checked;

        // ✅ VALIDACIÓN (Corrected)
        if (!nameVal || !emailVal || !passVal) {
            alert("Por favor, rellene todos los campos.");
            return;
        }

        if (passVal.length < 6) {
            alert("¡La contraseña debe tener al menos 6 caracteres!");
            return;
        }

        if (!confirmCheck || !legalCheck) {
            alert("¡Debe aceptar los términos y condiciones!");
            return;
        }

        try {
            // 1. Crear usuario en Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, emailVal, passVal);
            const user = userCredential.user;

            // 2. Actualizar perfil con el nombre
            await updateProfile(user, { displayName: nameVal });

            // 3. Guardar en Firestore - ROLNI "student" QILDIM (Adult kabi bitta joyga kirishi uchun)
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: nameVal,
                email: emailVal,
                role: "student", // ✅ Muhim: Adult bilan bitta dashboardga kirishi uchun
                type: "tutor",   // Lekin turi baribir tutor bo'lib qoladi
                createdAt: serverTimestamp()
            });

            alert("¡Registro completado con éxito! ✅");
 // 🔥 Tizimdan chiqaramiz va login sahifasiga yuboramiz
            await signOut(auth);
            window.location.href = "login.html";

        } catch (error) {
            console.error("Error:", error.code);
            if (error.code === "auth/email-already-in-use") {
                alert("Este correo electrónico ya está registrado.");
            } else {
                alert("Error: " + error.message);
            }
        }
    }

    // Botón event listener
    window.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("btnRegisterTutor");
        if (btn) {
            btn.addEventListener("click", handleRegister);
        }
    });
</script>
</body>
</html>
