 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | NOVA PRIME</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            height:100vh; display:flex; justify-content:center; align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
        }
        .auth-container {
            width:380px; background:white; padding:40px; border-radius:18px;
            box-shadow:0 25px 60px rgba(0,0,0,.3); text-align: center;
        }
        .logo { display:block; margin:0 auto 20px auto; width:140px; }
        h2 { color:#1e3a8a; margin-bottom:10px; }
        .subtitle { font-size:14px; color:#64748b; margin-bottom:25px; }
        .form-group { margin-bottom:15px; }
        input { width:100%; padding:12px; border-radius:10px; border:1px solid #d1d5db; font-size:14px; }
        .btn-main {
            width:100%; padding:13px; border:none; border-radius:10px;
            background:#2563eb; color:white; font-weight:bold; cursor:pointer;
        }
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <h2 style="color: #1e3a8a;">Cargando...</h2>
        <p>Por favor, espere un momento.</p>
    </div>

    <div class="auth-container" id="loginForm">
        <img src="../assets/images/nova-prime-logo.png" class="logo" alt="Logo">
        <h2>Iniciar Sesión</h2>
        <p class="subtitle">Accede a tu cuenta registrada</p>

        <div class="form-group">
            <input type="email" id="loginEmail" placeholder="Correo electrónico">
        </div>
        <div class="form-group">
            <input type="password" id="loginPassword" placeholder="Contraseña">
        </div>

        <button class="btn-main" onclick="loginUser()">
            🔐 Iniciar sesión
        </button>
        
        <div style="margin-top: 20px; font-size: 14px;">
            <a href="age.html" style="color: #2563eb; text-decoration: none;">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "../firebase.js";
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const loadingOverlay = document.getElementById("loadingOverlay");
        const loginForm = document.getElementById("loginForm");

        // 🔥 MUHIM: Avtomatik kirishni o'chirib tashladik. 
        // Har gal login sahifasiga kelganda eski sessiya bo'lsa uni tozalaymiz.
        (async () => {
            await signOut(auth);
            console.log("Sessiya tozalandi, endi login so'raladi.");
        })();

        // LOGIN FUNKSIYASI
        window.loginUser = async function () {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                alert("Por favor, rellene todos los campos.");
                return;
            }

            try {
                loadingOverlay.style.display = "flex"; 
                loginForm.style.display = "none";

                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // Firestore'dan rolni tekshirish
 const snap = await getDoc(doc(db, "users", uid));
                
                if (snap.exists()) {
                    const data = snap.data();
                    
                    if (data.role === "teacher") {
                        window.location.href = "../teacher/dashboard.html";
                    } else {
                        // Tutor yoki Student bo'lsa - bitta joyga!
                        window.location.href = "../student/index.html";
                    }
                } else {
                    alert("¡Usuario no encontrado!");
                    await signOut(auth); // Xato bo'lsa sessiyani yopamiz
                    location.reload();
                }

            } catch (error) {
                loadingOverlay.style.display = "none";
                loginForm.style.display = "block";
                
                if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found") {
                    alert("Correo o contraseña incorrectos.");
                } else {
                    alert("Error: " + error.message);
                }
            }
        };
    </script>
</body>
</html>
