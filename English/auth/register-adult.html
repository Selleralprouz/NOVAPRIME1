 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Adulto | NOVA PRIME</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">

    <div class="auth-container">
        <img src="../assets/images/nova-prime-logo.png" alt="NOVA PRIME Logo" class="logo">

        <h2>Registro de Adulto</h2>
        <p class="subtitle">Crea tu cuenta y comienza tu progreso en inglés</p>

        <div class="form-group">
            <input type="text" id="adultName" placeholder="Nombre completo">
        </div>

        <div class="form-group">
            <input type="email" id="adultEmail" placeholder="Correo electrónico">
        </div>

        <div class="form-group">
            <input type="password" id="adultPassword" placeholder="Crear contraseña">
        </div>

        <div class="form-group">
            <input type="password" id="adultConfirmPassword" placeholder="Confirmar contraseña">
        </div>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="adultDeclaration">
                Declaro bajo protesta de decir verdad que soy mayor de 18 años.
            </label>
        </div>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="adultLegalAccept">
                Acepto el <a href="../legal.html" target="_blank">Aviso Legal</a>, 
                la <a href="../privacy.html" target="_blank">Política de Privacidad</a> 
                y los <a href="../terms.html" target="_blank">Términos y Condiciones</a>.
            </label>
        </div>

        <button type="button" class="btn-main" id="btnRegister">
            Crear cuenta
        </button>

        <div class="back-link">
            <a href="age.html">← Volver</a>
        </div>
    </div>

<script type="module">
    // 1. Firebase imports
    import { auth, db } from "../firebase.js";
    import { createUserWithEmailAndPassword, updateProfile, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { setDoc, doc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 2. Función de registro
    async function registerAdult() {
        console.log("Proceso de registro iniciado...");

        const nameEl = document.getElementById("adultName");
        const emailEl = document.getElementById("adultEmail");
        const passEl = document.getElementById("adultPassword");
        const confirmEl = document.getElementById("adultConfirmPassword");
        const declEl = document.getElementById("adultDeclaration");
        const legalEl = document.getElementById("adultLegalAccept");

        const name = nameEl.value.trim();
        const email = emailEl.value.trim();
        const pass = passEl.value;
        const confirm = confirmEl.value;

        // ✅ VALIDACIÓN
        if (!name || !email || !pass || !confirm) {
            alert("Por favor, rellene todos los campos.");
            return;
        }

        if (pass !== confirm) {
            alert("Las contraseñas no coinciden.");
            return;
        }

        if (!declEl.checked || !legalEl.checked) {
            alert("Debe aceptar los términos y confirmar su mayoría de edad.");
            return;
        }

        try {
            // 🔐 Creación del usuario
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const uid = userCredential.user.uid;

            // Actualizar perfil
            await updateProfile(userCredential.user, { displayName: name });

            // 🧠 Guardar en Firestore
            await setDoc(doc(db, "users", uid), {
                uid: uid,
                name: name,
                email: email,
                role: "student",
                type: "adult",
                createdAt: serverTimestamp()
            });

            alert("¡Registro completado con éxito! ✅");
// 🔥 MUHIM: Tizimdan chiqaramiz, foydalanuvchi login sahifasidan qayta kirishi uchun
            await signOut(auth);
            window.location.href = "login.html";

        } catch (error) {
            console.error("Error ocurrido:", error);
            if (error.code === "auth/email-already-in-use") {
                alert("Este correo electrónico ya está registrado.");
            } else {
                alert("Error: " + error.message);
            }
        }
    }

    // 🔥 3. Evento del botón
    document.addEventListener("DOMContentLoaded", () => {
        const registerBtn = document.getElementById("btnRegister");
        if (registerBtn) {
            registerBtn.addEventListener("click", registerAdult);
            console.log("Botón conectado con éxito ✅");
        }
    });

    window.registerAdult = registerAdult;
</script>
</body>
</html>
