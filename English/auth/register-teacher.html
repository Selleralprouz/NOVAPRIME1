<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Profesor | NOVA PRIME</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="auth-page">

<div class="auth-container">
    <img src="../assets/images/nova-prime-logo.png" alt="NOVA PRIME Logo" class="logo" style="display:block; margin:0 auto 20px auto; width:140px;">

    <h2>Solicitud de Registro de Docente</h2>
    <p class="subtitle">Plataforma de Inglés NOVA PRIME</p>

    <div class="form-group">
        <input type="text" id="teacherName" placeholder="Nombre completo">
    </div>

    <div class="form-group">
        <input type="email" id="teacherEmail" placeholder="Correo electrónico">
    </div>

    <div class="form-group">
        <input type="password" id="teacherPassword" placeholder="Crear contraseña (mínimo 6 caracteres)">
    </div>

    <div class="checkbox-group">
        <label>
            <input type="checkbox" id="teacherDeclaration">
            Declaro que la información proporcionada es veraz.
        </label>
    </div>

    <div class="checkbox-group">
        <label>
            <input type="checkbox" id="teacherLegalAccept">
            Acepto el 
            <a href="../legal.html" target="_blank">Aviso Legal</a>, 
            la <a href="../privacy.html" target="_blank">Política de Privacidad</a> 
            y los <a href="../terms.html" target="_blank">Términos y Condiciones</a>.
        </label>
    </div>

    <div class="info-box" style="background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 13px; color: #475569; margin-bottom: 20px;">
        🔓 La cuenta será creada automáticamente con rol de profesor.
    </div>

    <button class="btn-main glow-btn" id="btnRegisterTeacher">
        🚀 Crear cuenta
    </button>

    <div class="back-link">
        <a href="login.html">← Ya tengo cuenta</a>
    </div>

</div>

<script type="module">
    import { auth, db } from "../firebase.js";
    import { 
        createUserWithEmailAndPassword, 
        updateProfile,
        signOut 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { 
        setDoc, 
        doc, 
        serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function registerTeacher() {
        console.log("Iniciando registro de profesor...");

        const name = document.getElementById("teacherName").value.trim();
        const email = document.getElementById("teacherEmail").value.trim();
        const password = document.getElementById("teacherPassword").value;
        const declaration = document.getElementById("teacherDeclaration").checked;
        const legal = document.getElementById("teacherLegalAccept").checked;

        /* ✅ VALIDACIÓN */
        if (!name || !email || !password) {
            alert("Por favor, completa todos los campos obligatorios.");
            return;
        }

        if (password.length < 6) {
            alert("La contraseña debe tener al menos 6 caracteres.");
            return;
        }

        if (!declaration) {
            alert("Debes confirmar que la información proporcionada es veraz.");
            return;
        }

        if (!legal) {
            alert("Debes aceptar los términos y condiciones legales.");
            return;
        }

        try {
            /* 🔐 Crear Usuario */
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;

            /* 👤 Actualizar Perfil */
            await updateProfile(userCredential.user, {
                displayName: name
            });

            /* 🧠 Guardar en Firestore: role: "teacher" */
            await setDoc(doc(db, "users", uid), {
                uid: uid,
                name: name,
                email: email,
                role: "teacher",
                createdAt: serverTimestamp()
            });
 alert("¡Cuenta de profesor creada con éxito! ✅ Por favor, inicia sesión.");

            /* 🔥 CERRAR SESIÓN Y REDIRIGIR */
            await signOut(auth);
            window.location.href = "login.html";

        } catch (error) {
            console.error("Error detallado:", error);
            if (error.code === "auth/email-already-in-use") {
                alert("Este correo electrónico ya está registrado.");
            } else {
                alert("Error al registrar la cuenta: " + error.message);
            }
        }
    }

    // Vincular botón
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("btnRegisterTeacher");
        if (btn) {
            btn.addEventListener("click", registerTeacher);
            console.log("Botón de profesor conectado ✅");
        }
    });
</script>

</body>
</html>
