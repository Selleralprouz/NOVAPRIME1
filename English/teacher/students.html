<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Students | NOVA PRIME</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .dark-toggle{cursor:pointer; font-size:20px; margin-left:auto;}
        body.dark{background:#0f172a; color:#e5e7eb;}
        body.dark .card{background:#1e293b; color:#e5e7eb;}
        .topbar{background:#f1f5f9; padding:12px 20px; border-radius:12px; margin-bottom:20px; display:flex; align-items:center;}
        body.dark .topbar{background:#1e293b;}
        .student-table{width:100%; border-collapse:collapse; margin-top:10px;}
        .student-table th, .student-table td{padding:12px; border-bottom:1px solid #e5e7eb; text-align:left;}
        body.dark .student-table th, body.dark .student-table td{border-bottom:1px solid #334155;}
        .filter-bar{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;}
        .filter-bar select, .filter-bar input{padding:8px 12px; border-radius:8px; border:1px solid #ddd;}
        .group-label { font-weight: bold; color: #2563eb; }
        .loading-text { text-align: center; padding: 20px; font-style: italic; }
        .sidebar hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0; }
        .moveBtn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; background: #2563eb; color: white; }
        .moveBtn.save { background: #10b981; }
    </style>
</head>

<body class="teacher-page">
<div class="overlay"></div>
<div class="dashboard">
    <aside class="sidebar">
        <h2>NOVA PRIME</h2>
        <ul>
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="students.html">👨‍🎓 My Students</a></li>
            <li><a href="content.html">📚 My Content</a></li>
            <li><a href="activity-builder.html">🛠 Activity Builder</a></li>
            <li><a href="assessments.html">🧠 My Assessments</a></li>
            <li><a href="practice-tools.html">🎧 Practice Tools</a></li>
            <li><a href="messages.html">💬 Messages</a></li>
            <li><a href="analytics.html">📊 My Analytics</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
            <hr>
            <li><a href="#" id="btnLogout">🚪 Log out</a></li>
        </ul>
    </aside>

    <main class="content">
        <header class="topbar">
            <button class="menu-btn">☰</button>
            <h1>My Students Management</h1>
            <div class="dark-toggle" id="darkBtn" onclick="toggleMode()">🌙</div>
        </header>

        <section class="cards">
            <div class="card">
                <h3>Student List</h3>
                <div class="filter-bar">
                    <input type="text" id="nameSearch" placeholder="Search by name...">
                    <select id="gradeFilter">
                        <option value="">All Grades</option>
                        <option value="Grade 1">Grade 1</option>
                        <option value="Grade 2">Grade 2</option>
                        <option value="Grade 3">Grade 3</option>
                    </select>
                    <select id="groupFilter">
                        <option value="">All Groups</option>
                        <option value="A">Group A</option>
                        <option value="B">Group B</option>
                        <option value="C">Group C</option>
                    </select>
                </div>

                <table class="student-table" id="studentTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email/Type</th>
                            <th>Grade</th>
                            <th>Group</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentBody">
                        <tr><td colspan="5" class="loading-text">Loading students...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { auth, db } from "../firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, query, where, getDocs, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const studentBody = document.getElementById("studentBody");
    let allStudents = [];

    // 1. AUTH CHECK
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "../index.html";
        } else {
            loadStudentsRealtime();
        }
    });

    // 2. REALTIME LOAD STUDENTS (o'zgarishlarni avtomatik yangilaydi)
    function loadStudentsRealtime() {
        const q = query(collection(db, "users"), where("role", "==", "student"));
        
        onSnapshot(q, (querySnapshot) => {
            allStudents = [];
            studentBody.innerHTML = "";
            
            if (querySnapshot.empty) {
                studentBody.innerHTML = "<tr><td colspan='5'>No students found. Add students first.</td></tr>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const student = {
                    id: doc.id,
                    name: data.name || data.displayName || "N/A",
                    email: data.email || "No email",
                    type: data.type || "adult",
                    grade: data.grade || "Not Set",
                    group: data.group || "None"
                };
                allStudents.push(student);
            });
            
            renderStudents(allStudents);
        }, (error) => {
            console.error("Error loading students:", error);
            studentBody.innerHTML = "<tr><td colspan='5'>Error loading data. Check console.</td></tr>";
        });
    }

    // 3. RENDER STUDENTS TO TABLE
    function renderStudents(students) {
        studentBody.innerHTML = "";
        
        students.forEach((student) => {
            const row = document.createElement("tr");
            row.setAttribute("data-id", student.id);

            row.innerHTML = `
                <td>${student.name}</td>
                <td><small>${student.email}<br>(${student.type})</small></td>
                <td>${student.grade}</td>
                <td>
                    <span class="group-label">${student.group}</span>
                    <select class="groupSelect" style="display:none; padding:4px; border-radius:4px;">
                        <option value="None">None</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                    </select>
                </td>
                <td>
                    <button class="btn moveBtn" onclick="window.toggleMove(this)">Move</button>
                </td>
            `;
            studentBody.appendChild(row);
        });
    }

    // 4. TOGGLE GROUP EDIT / SAVE
    window.toggleMove = async function(btn) {
        const row = btn.closest("tr");
        const userId = row.getAttribute("data-id");
        const label = row.querySelector(".group-label");
        const select = row.querySelector(".groupSelect");

        // Edit mode
        if (select.style.display === "none") {
            select.value = label.textContent === "None" ? "None" : label.textContent;
            select.style.display = "inline-block";
            label.style.display = "none";
            btn.textContent = "Save";
            btn.classList.add("save");
        } 
        // Save mode
        else {
            const newGroup = select.value;
            const originalText = btn.textContent;
            btn.textContent = "Saving...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "users", userId), {
                    group: newGroup
                });
                
                // UI revert handled by onSnapshot
                btn.textContent = "Move";
                btn.classList.remove("save");
                btn.disabled = false;
                label.style.display = "inline";
                select.style.display = "none";
                
            } catch (error) {
                alert("Update failed: " + error.message);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    };

    // 5. FILTER FUNCTION (real-time)
    window.filterRows = function() {
        const nameVal = document.getElementById("nameSearch").value.toLowerCase();
        const gradeVal = document.getElementById("gradeFilter").value;
        const groupVal = document.getElementById("groupFilter").value;
        
        const filtered = allStudents.filter(student => {
            const nameMatch = student.name.toLowerCase().includes(nameVal);
            const gradeMatch = !gradeVal || student.grade === gradeVal;
            const groupMatch = !groupVal || student.group === groupVal;
            return nameMatch && gradeMatch && groupMatch;
        });
        
        renderStudents(filtered);
    };

    // Attach filter listeners
    document.getElementById("nameSearch").addEventListener("input", window.filterRows);
    document.getElementById("gradeFilter").addEventListener("change", window.filterRows);
    document.getElementById("groupFilter").addEventListener("change", window.filterRows);

    // 6. LOGOUT
    document.getElementById("btnLogout").addEventListener("click", (e) => {
        e.preventDefault();
        signOut(auth).then(() => {
            window.location.href = "../index.html";
        });
    });

</script>

<script>
    // UI LOGIC (DARK MODE, SIDEBAR)
    function toggleMode(){
        document.body.classList.toggle("dark");
        let btn=document.getElementById("darkBtn");
        if(document.body.classList.contains("dark")){
            btn.textContent="☀️";
            localStorage.setItem("novaMode","dark");
        }else{
            btn.textContent="🌙";
            localStorage.setItem("novaMode","light");
        }
    }
    (function loadMode(){
        if(localStorage.getItem("novaMode")==="dark") {
            document.body.classList.add("dark");
            document.getElementById("darkBtn").textContent="☀️";
        }
    })();

    const menuBtn = document.querySelector(".menu-btn");
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.querySelector(".overlay");
    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("show");
        overlay.classList.toggle("show");
    });
    overlay.addEventListener("click", () => {
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
    });
    
    // Active menu highlight
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar a").forEach(link => {
        if(link.getAttribute("href") === currentPage) {
            link.parentElement.classList.add("active");
        }
    });
</script>
</body>
</html>
